name: Build and Release Jar

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --stacktrace

    - name: Collect release files
      shell: bash
      run: |
        mkdir -p release
        find build/libs -maxdepth 1 -type f -name '*.jar' \
          ! -name '*-dev.jar' \
          ! -name '*-sources.jar' \
          ! -name '*-javadoc.jar' \
          -exec cp {} release/ \;
        test -n "$(find release -maxdepth 1 -type f -name '*.jar' -print -quit)"
        sha256sum release/*.jar > release/SHA256SUMS.txt

    - name: Upload workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: altoclef-release-files
        path: release/
        if-no-files-found: error

    - name: Update latest release
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: |
        tag="latest"
        title="Latest Altoclef build"
        notes_file="$(mktemp)"

        {
          echo "Automated build for commit ${GITHUB_SHA}."
          echo
          echo "Download the jar below and put it in your Minecraft mods folder."
        } > "$notes_file"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -f "$tag" "$GITHUB_SHA"
        git push -f origin "$tag"

        if gh release view "$tag" >/dev/null 2>&1; then
          gh release edit "$tag" \
            --title "$title" \
            --notes-file "$notes_file" \
            --latest
          gh release view "$tag" --json assets --jq '.assets[].name' | while IFS= read -r asset
          do
            gh release delete-asset "$tag" "$asset" --yes
          done
          gh release upload "$tag" release/*
        else
          gh release create "$tag" release/* \
            --title "$title" \
            --notes-file "$notes_file" \
            --latest
        fi
