plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = "LocalBaritone"
        url = uri("local-maven")
    }
    mavenCentral()
}

loom {
    mods {
        "altoclef" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"

    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

    implementation "com.fasterxml.jackson.core:jackson-core:${project.jackson_version}"
    implementation "com.fasterxml.jackson.core:jackson-annotations:${project.jackson_version}"
    implementation "com.fasterxml.jackson.core:jackson-databind:${project.jackson_version}"
    include "com.fasterxml.jackson.core:jackson-core:${project.jackson_version}"
    include "com.fasterxml.jackson.core:jackson-annotations:${project.jackson_version}"
    include "com.fasterxml.jackson.core:jackson-databind:${project.jackson_version}"

    compileOnly files("libs/baritone-fabric-1.21.4-dev-shadow-altoclef.jar")
    runtimeOnly files("libs/baritone-fabric-26.1.2-dev-shadow-altoclef.jar")
    implementation "dev.babbaj:nether-pathfinder:1.4.1"
    include "baritone:altoclef-runtime:26.1.2-altoclef"
    include "dev.babbaj:nether-pathfinder:1.4.1"
}

processResources {
    def version = project.version
    inputs.property "version", version

    filesMatching("fabric.mod.json") {
        expand "version": version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 25
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.name}" }
    }
}

publishing {
    publications {
        create("mavenJava", MavenPublication) {
            from components.java
        }
    }
}
